<script>
        // UI Logic
        const chatFeed = document.getElementById('chatFeed');
        const emptyState = document.getElementById('emptyState');
        const messagesList = document.getElementById('messagesList');
        const userInput = document.getElementById('userInput');

        function fillInput(text) {
            userInput.value = text;
            userInput.focus();
        }

        function createMessageElement(text, isAI) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isAI ? 'justify-start' : 'justify-end'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            const content = `
                <div class="flex gap-4 max-w-[85%] ${isAI ? 'flex-row' : 'flex-row-reverse'}">
                    <div class="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center ${isAI ? 'bg-primary text-white' : 'bg-surface-container-highest text-primary'}">
                        <span class="material-symbols-outlined text-[18px]">${isAI ? 'auto_awesome' : 'person'}</span>
                    </div>
                    <div class="p-4 rounded-2xl ${isAI ? 'ai-bubble text-on-surface' : 'bg-primary text-white shadow-lg'}">
                        <p class="font-body-md leading-relaxed whitespace-pre-wrap">${text}</p>
                    </div>
                </div>
            `;
            
            wrapper.innerHTML = content;
            return wrapper;
        }

        async function askGemini() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            // Update UI state
            emptyState.classList.add('hidden');
            messagesList.classList.remove('hidden');
            
            // Add user message
            messagesList.appendChild(createMessageElement(prompt, false));
            userInput.value = '';
            
            // Add thinking placeholder
            const thinking = createMessageElement('Thinking...', true);
            thinking.id = 'thinking-bubble';
            thinking.querySelector('p').classList.add('italic', 'opacity-50');
            messagesList.appendChild(thinking);
            
            // Scroll to bottom
            chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });

            try {
                // This is the original logic preservation
                // In a real environment, the system replaces this with the actual API call
                // For the UI simulation, we'll mimic the response handling
                
                // Simulate call delay
                await new Promise(r => setTimeout(r, 1500));
                
                // Actual integration expects this global call (handled by the platform)
                // if (typeof window.askGeminiActual === 'function') {
                //    await window.askGeminiActual();
                // }
                
                // Simulated Response for demonstration
                const response = "As Lumina AI, I've analyzed your request. I am optimized for clarity and high-end productivity. How else can I assist your workflow today?";
                
                // Replace thinking with actual response
                const thinkingBubble = document.getElementById('thinking-bubble');
                if (thinkingBubble) thinkingBubble.remove();
                
                messagesList.appendChild(createMessageElement(response, true));
                chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });
                
            } catch (error) {
                console.error('Error calling Gemini:', error);
                const thinkingBubble = document.getElementById('thinking-bubble');
                if (thinkingBubble) thinkingBubble.remove();
                messagesList.appendChild(createMessageElement("I apologize, but I encountered an error. Please try again.", true));
            }
        }
    </script>
