<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Lumina AI | Premium Intelligence</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .ai-bubble { background: rgba(234, 237, 255, 0.5); backdrop-filter: blur(8px); border: 1px solid rgba(70, 72, 212, 0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #dae2fd; border-radius: 10px; }
    </style>
</head>
<body class="bg-background text-on-surface h-screen flex">

<main class="flex-1 flex flex-col relative bg-background">
    <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-8 flex flex-col max-w-[900px] mx-auto w-full pb-32" id="chatFeed">
        <div class="space-y-6" id="messagesList"></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-6">
        <div class="max-w-[900px] mx-auto w-full">
            <div class="bg-white rounded-full p-2 pl-6 pr-2 shadow-xl flex items-center gap-3 ring-1 ring-white/60">
                <input class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface py-3" id="userInput" placeholder="Message Lumina AI..." type="text" onkeydown="if(event.key === 'Enter') askGemini()"/>
                <button class="bg-primary text-white w-12 h-12 rounded-full flex items-center justify-center shadow-md" id="sendBtn" onclick="askGemini()">
                    <span class="material-symbols-outlined">arrow_upward</span>
                </button>
            </div>
        </div>
    </div>
</main>

<script>
    const messagesList = document.getElementById('messagesList');
    const userInput = document.getElementById('userInput');
    const chatFeed = document.getElementById('chatFeed');

    function createMessageElement(text, isAI) {
        const wrapper = document.createElement('div');
        wrapper.className = `flex ${isAI ? 'justify-start' : 'justify-end'}`;
        wrapper.innerHTML = `
            <div class="flex gap-4 max-w-[85%] ${isAI ? 'flex-row' : 'flex-row-reverse'}">
                <div class="p-4 rounded-2xl ${isAI ? 'ai-bubble' : 'bg-primary text-white'}">
                    <p class="whitespace-pre-wrap">${text}</p>
                </div>
            </div>`;
        return wrapper;
    }

    async function askGemini() {
        const prompt = userInput.value.trim();
        if (!prompt) return;

        messagesList.appendChild(createMessageElement(prompt, false));
        userInput.value = '';
        
        const thinking = createMessageElement('Thinking...', true);
        thinking.id = 'thinking-bubble';
        messagesList.appendChild(thinking);
        chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            const data = await response.json();
            document.getElementById('thinking-bubble')?.remove();
            
            if (data.text) {
                messagesList.appendChild(createMessageElement(data.text, true));
            } else {
                throw new Error(data.error || "No response received");
            }
        } catch (error) {
            document.getElementById('thinking-bubble')?.remove();
            messagesList.appendChild(createMessageElement("Error: " + error.message, true));
        }
        chatFeed.scrollTo({ top: chatFeed.scrollHeight, behavior: 'smooth' });
    }
</script>
</body>
</html>
